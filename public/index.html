<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#667eea" />
    <meta
      name="description"
      content="조세핀의 다락방 - 소중한 일상과 추억을 담는 공간"
    />
    <script>
      (function () {
        var redirectPath = window.location.search.slice(1);

        if (!redirectPath || redirectPath.charAt(0) !== "/") {
          return;
        }

        window.history.replaceState(
          null,
          "",
          window.location.pathname.replace(/\/$/, "") +
            redirectPath +
            window.location.hash
        );
      })();
    </script>
    <title>조세핀의 다락방</title>
  </head>
  <body>
    <noscript>JavaScript가 필요합니다.</noscript>
    <div id="root"></div>
  </body>
</html>
